<aside class="search-sidebar">
  <div id="search"></div>
</aside>

<script>
window.addEventListener('DOMContentLoaded', () => {
  if (typeof PagefindUI === 'undefined') return;
  new PagefindUI({
    element: "#search",
    showSubResults: false,
    showImages: false,
    resetStyles: false,
    placeholder: "검색...",
    translations: {
      placeholder: "검색...",
      clear_search: "지우기",
      load_more: "더 보기",
      search_label: "검색",
      filters_label: "필터",
      zero_results: "결과 없음: [SEARCH_TERM]",
      many_results: "[COUNT]개 결과: [SEARCH_TERM]",
      one_result: "1개 결과: [SEARCH_TERM]",
      alt_search: "결과 없음: [SEARCH_TERM]. 다음 결과 표시: [DIFFERENT_TERM]",
      search_suggestion: "결과 없음: [SEARCH_TERM]. 다음 시도: [DIFFERENT_TERM]",
      searching: "검색 중: [SEARCH_TERM]..."
    }
  });
});
</script>
