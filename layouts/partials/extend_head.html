<!-- Chart.js for inline data visualizations in posts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>

<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js" defer></script>

<style>
/* ============================================
   1. 헤더 — 블로그 제목 좌측 벽 밀착 (전체 페이지 공통)
   ============================================ */
.header {
  max-width: 100% !important;
  width: 100% !important;
  padding: 0 !important;
  margin: 0 !important;
}
.header-nav {
  max-width: 100% !important;
  padding-left: 0.8rem !important;
  padding-right: 1rem !important;
  width: 100% !important;
  box-sizing: border-box;
}
.logo {
  padding-left: 0 !important;
  margin-left: 0 !important;
}
.logo a {
  padding-left: 0 !important;
  margin-left: 0 !important;
}

/* 상단 네비게이션 메뉴 제거 */
#menu,
ul#menu,
nav.nav #menu {
  display: none !important;
}

/* ============================================
   2. 메인 컨테이너 max-width 풀기
   ============================================ */
.main {
  max-width: 100% !important;
  padding-left: 0 !important;
  padding-right: 0 !important;
  width: 100% !important;
}

/* ============================================
   3. 3단 그리드 — 모든 페이지 동일 (홈/카테고리/single)
   사이드바 위치 1픽셀도 안 움직이도록 단일 정의
   ============================================ */
.layout-three-col {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr) 320px;
  gap: 2rem;
  padding: 0 1.5rem;
  align-items: start;
  width: 100%;
  box-sizing: border-box;
  position: relative;
}

/* 기본 main-column (홈 / 카테고리) */
.layout-three-col .main-column {
  min-width: 0;
  max-width: 920px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* Single 전용 — 다른 점은 main-column.max-width 숫자뿐 */
.layout-three-col.single .main-column {
  max-width: 1100px;
  /* margin: 0 auto, width: 100%, position/z-index 모두 동일 패턴 상속 */
}

/* post-single은 부모 main-column 폭을 따름 (자체 폭 제어 없음) */
.layout-three-col.single .single-column .post-single {
  max-width: none;
  width: 100%;
  margin: 0;
}

/* 이미지가 원본 비율로 시원하게 보이도록 */
.layout-three-col.single .post-content img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 1.5rem auto;
  border-radius: 6px;
}
.layout-three-col.single .post-content pre {
  max-width: 100%;
  overflow-x: auto;
}

/* ============================================
   3-2. 좌/우 사이드바 위치 잠금 — single에서도 절대 변형 금지
   ============================================ */
.layout-three-col .cat-sidebar,
.layout-three-col.single .cat-sidebar,
.layout-three-col .search-sidebar,
.layout-three-col.single .search-sidebar {
  width: 100%;
  box-sizing: border-box;
}

/* ============================================
   4. 좌측 카테고리 사이드바 — 모든 페이지 동일
   ============================================ */
.cat-sidebar {
  position: sticky;
  top: 80px;
  align-self: start;
  padding: 0.4rem 0 0 0.5rem;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  z-index: 40;
  pointer-events: auto;
}
.cat-sidebar h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--secondary);
  margin: 0 0 0.8rem 0;
}
.cat-sidebar ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.cat-sidebar li {
  margin-bottom: 0.3rem;
}
.cat-sidebar a {
  display: block;
  padding: 0.55rem 0.75rem;
  border-radius: 6px;
  color: var(--primary);
  text-decoration: none;
  font-size: 14px;
  transition: background 0.15s;
  pointer-events: auto;
}
.cat-sidebar a:hover {
  background: var(--code-bg);
}
.cat-sidebar a.active {
  background: var(--code-bg);
  font-weight: 600;
}

/* ============================================
   5. 우측 검색 사이드바 — 모든 페이지 동일
   ============================================ */
.search-sidebar {
  position: sticky;
  top: 80px;
  align-self: start;
  padding: 0.4rem 0.5rem 0 0;
  z-index: 40;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  isolation: isolate;
  pointer-events: auto;
}
.search-sidebar .pagefind-ui {
  --pagefind-ui-scale: 0.8;
  --pagefind-ui-primary: var(--primary);
  --pagefind-ui-text: var(--primary);
  --pagefind-ui-background: var(--theme);
  --pagefind-ui-border: var(--border);
  --pagefind-ui-tag: var(--code-bg);
  --pagefind-ui-border-width: 1px;
  --pagefind-ui-border-radius: 6px;
  --pagefind-ui-font: inherit;
}
.search-sidebar .pagefind-ui__results-area {
  position: relative;
  z-index: 41;
}
.search-sidebar .pagefind-ui__result {
  border-bottom: 1px solid var(--border);
}

/* ============================================
   6. 중앙 페이지 타이틀
   ============================================ */
.main-column .page-header.center-title {
  margin: 0.5rem 0 2rem 0;
  padding: 0 0 1.2rem 0;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.main-column .page-header.center-title h1 {
  font-size: 2.2rem;
  font-weight: 800;
  margin: 0;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--primary);
}

/* ============================================
   7. 빈 상태 / 404
   ============================================ */
.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--secondary);
  font-size: 1rem;
  background: var(--code-bg);
  border-radius: 8px;
  max-width: 100%;
}
.not-found {
  text-align: center;
  padding: 4rem 1rem;
  max-width: 100%;
}
.not-found h1 {
  font-size: 5rem;
  font-weight: 800;
  margin: 0 0 0.5rem 0;
  color: var(--primary);
  letter-spacing: -0.04em;
}
.not-found p {
  font-size: 1.1rem;
  color: var(--secondary);
  margin: 0 0 2rem 0;
}
.not-found-home {
  display: inline-block;
  padding: 0.7rem 1.5rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--code-bg);
  color: var(--primary);
  text-decoration: none;
  font-size: 14px;
  transition: background 0.15s;
}
.not-found-home:hover {
  background: var(--tertiary);
}

/* ============================================
   8. 더 보기 버튼
   ============================================ */
.more-wrap {
  text-align: center;
  margin: 2rem 0;
}
#load-more-btn {
  padding: 0.6rem 1.8rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--code-bg);
  color: var(--primary);
  cursor: pointer;
  font-size: 14px;
  transition: background 0.15s;
}
#load-more-btn:hover {
  background: var(--tertiary);
}

/* ============================================
   8-2. 이전 글 / 다음 글 네비게이션 (.paginav) — 1:1 대칭
   ============================================ */
.paginav {
  display: flex;
  gap: 1rem;
  margin: 3rem 0 2rem 0;
  width: 100%;
}
.paginav a {
  flex: 1 1 0;
  min-width: 0;
  min-height: 88px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 1rem 1.5rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--code-bg);
  color: var(--primary);
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
  box-sizing: border-box;
  overflow: hidden;
}
.paginav a:hover {
  background: var(--tertiary);
  border-color: var(--primary);
}
.paginav a.prev {
  text-align: left;
  align-items: flex-start;
}
.paginav a.next {
  text-align: right;
  align-items: flex-end;
}
.paginav a .title {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--secondary);
  margin-bottom: 0.4rem;
  letter-spacing: 0.02em;
}
.paginav a span:not(.title) {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
}
@media (max-width: 700px) {
  .paginav {
    flex-direction: column !important;
    gap: 0.6rem;
  }
  .paginav a,
  .paginav a.prev,
  .paginav a.next {
    text-align: left;
    align-items: flex-start;
    min-height: 70px;
  }
}

/* ============================================
   9. 분류 목록 (taxonomy)
   ============================================ */
.taxonomy-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.taxonomy-list li {
  padding: 0.8rem 0;
  border-bottom: 1px solid var(--border);
}
.taxonomy-list a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}
.taxonomy-count {
  color: var(--secondary);
  font-size: 0.9rem;
  margin-left: 0.5rem;
}

/* ============================================
   10. 반응형
   ============================================ */
@media (max-width: 1200px) {
  .layout-three-col {
    grid-template-columns: 200px minmax(0, 1fr) 280px;
    gap: 1.5rem;
  }
}
@media (max-width: 1000px) {
  .layout-three-col,
  .layout-three-col.single {
    grid-template-columns: 180px minmax(0, 1fr);
    grid-template-areas:
      "search search"
      "cat main";
  }
  .cat-sidebar { grid-area: cat; }
  .main-column { grid-area: main; }
  .search-sidebar {
    grid-area: search;
    position: static;
    max-height: none;
    margin-bottom: 1rem;
  }
}
@media (max-width: 700px) {
  .layout-three-col,
  .layout-three-col.single {
    grid-template-columns: 1fr;
    grid-template-areas:
      "search"
      "cat"
      "main";
    padding: 0 1rem;
  }
  .cat-sidebar {
    position: static;
    max-height: none;
    padding: 0;
  }
  .main-column .page-header.center-title h1 {
    font-size: 1.8rem;
  }
}
</style>
