name: Assign Weight to New Posts

on:
  push:
    paths:
      - 'content/posts/**/*.md'
    branches:
      - main

jobs:
  assign-weight:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Assign weight to posts without weight
        run: |
          python3 << 'PYEOF'
          import glob
          import re

          all_posts = sorted(glob.glob("content/posts/**/*.md", recursive=True))

          max_weight = 0
          for post in all_posts:
              with open(post, "r") as f:
                  content = f.read()
              match = re.search(r'^weight:\s*(\d+)', content, re.MULTILINE)
              if match:
                  max_weight = max(max_weight, int(match.group(1)))

          for post in all_posts:
              with open(post, "r") as f:
                  content = f.read()
              if "weight:" in content:
                  continue
              max_weight += 1
              content = re.sub(
                  r'^(---\n(?:.*\n)*?)(---)',
                  lambda m: m.group(1) + f'weight: {max_weight}\n' + m.group(2),
                  content,
                  count=1,
                  flags=re.MULTILINE
              )
              with open(post, "w") as f:
                  f.write(content)
              print(f"weight: {max_weight} assigned to {post}")
          PYEOF

      - name: Commit and trigger deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: assign weight to new posts"
            git push
          fi
