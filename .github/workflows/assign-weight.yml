name: Assign Weight to New Posts

on:
  push:
    paths:
      - 'content/posts/**/*.md'
    branches:
      - main

jobs:
  assign-weight:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assign weight to posts without weight
        run: |
          python3 << 'PYEOF'
          import glob
          import re

          all_posts = sorted(glob.glob("content/posts/**/*.md", recursive=True))

          # weight 있는 파일들의 최대 weight 찾기
          max_weight = 0
          for post in all_posts:
              with open(post, "r") as f:
                  content = f.read()
              match = re.search(r'^weight:\s*(\d+)', content, re.MULTILINE)
              if match:
                  max_weight = max(max_weight, int(match.group(1)))

          # weight 없는 파일에 순차 부여
          for post in all_posts:
              with open(post, "r") as f:
                  content = f.read()
              if "weight:" in content:
                  continue
              max_weight += 1
              # --- 구분자 뒤에 weight 삽입
              content = re.sub(
                  r'^(---\n(?:.*\n)*?)(---)',
                  lambda m: m.group(1) + f'weight: {max_weight}\n' + m.group(2),
                  content,
                  count=1,
                  flags=re.MULTILINE
              )
              with open(post, "w") as f:
                  f.write(content)
              print(f"weight: {max_weight} assigned to {post}")
          PYEOF

      - name: Commit weight changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git diff --staged --quiet || git commit -m "auto: assign weight to new posts"
          git push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo
        run: hugo --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
